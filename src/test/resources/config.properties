# Configuracion del navegador
browser=chrome
headless=false

# URL de la aplicacion (OWASP Juice Shop corriendo en Docker)
app.url=http://localhost:3000

# Timeouts (segundos)
# implicit=0 evita interferencia con los WebDriverWait explicitos (mezclar ambos es anti-patron)
timeout.implicit=0
timeout.explicit=30

# Carpeta de evidencias
screenshot.path=screenShots/
