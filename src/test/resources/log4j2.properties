status = error
name = JuiceShopLogConfig

# Console appender
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# File appender: un log por ejecucion, se guarda en target/logs
appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = target/logs/juice-shop-tests.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# Logger raiz
rootLogger.level = info
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender

# Logger especifico del proyecto
logger.juice.name = com.juice
logger.juice.level = debug
logger.juice.additivity = false
logger.juice.appenderRef.console.ref = ConsoleAppender
logger.juice.appenderRef.file.ref = FileAppender
