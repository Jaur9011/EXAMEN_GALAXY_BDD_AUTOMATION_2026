name: BDD Regression Suite – OWASP Juice Shop

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # Permite ejecución manual desde la UI de GitHub

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1 – Ejecutar suite de regresión completa
  # ─────────────────────────────────────────────────────────────────
  regression:
    name: Regression Suite (9 escenarios BDD)
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Java 17 (versión usada en el proyecto)
      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Levantar OWASP Juice Shop en Docker
      - name: 🐳 Iniciar Juice Shop (Docker)
        run: |
          docker pull bkimminich/juice-shop
          docker run --rm -d -p 3000:3000 --name juice-shop bkimminich/juice-shop
          echo "Esperando a que Juice Shop arranque..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "✅ Juice Shop listo en http://localhost:3000"
              break
            fi
            echo "  intento $i/30 – esperando 3s..."
            sleep 3
          done

      # 4. Ejecutar pruebas en modo headless
      - name: 🧪 Ejecutar suite de regresión (headless)
        run: |
          mvn clean test \
            -Dheadless=true \
            -Dbrowser=chrome \
            -Dsurefire.useFile=false \
            --no-transfer-progress
        continue-on-error: true           # Seguimos para siempre publicar el reporte

      # 5. Generar reporte Allure
      - name: 📊 Generar reporte Allure
        if: always()
        run: mvn allure:report --no-transfer-progress

      # 6. Publicar resultados Allure como artefacto descargable
      - name: 📦 Subir artefacto – Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: target/site/allure-maven-plugin/
          retention-days: 30

      # 7. Publicar resultados crudos (para Allure History en gh-pages)
      - name: 📦 Subir artefacto – Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results/
          retention-days: 30

      # 8. Subir screenshots de evidencia
      - name: 🖼️ Subir screenshots de evidencia
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenShots/
          retention-days: 30

      # 9. Publicar resultados de TestNG en la UI de GitHub
      - name: 📋 Publicar resultados JUnit/TestNG
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Cucumber / TestNG Results"
          path: "target/cucumber-reports/cucumber.xml"
          reporter: java-junit
          fail-on-error: false

      # 10. Detener el contenedor de Juice Shop
      - name: 🛑 Detener Juice Shop
        if: always()
        run: docker stop juice-shop || true

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 – Publicar el reporte HTML en GitHub Pages (rama gh-pages)
  # Solo se ejecuta en push a main/master
  # ─────────────────────────────────────────────────────────────────
  publish-report:
    name: Publicar Allure Report en GitHub Pages
    runs-on: ubuntu-latest
    needs: regression
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Descargar artefacto Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/

      - name: 🚀 Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          commit_message: "ci: actualizar Allure Report - run #${{ github.run_number }}"

